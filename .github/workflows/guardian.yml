name: Actron Temperature Guardian

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Run Guardian
        uses: actions/github-script@v7
        env:
          ACTRON_DEVICE_ID:   ${{ secrets.ACTRON_DEVICE_ID }}
          ACTRON_TOKEN:       ${{ secrets.ACTRON_TOKEN }}
          GUARDIAN_THRESHOLD: ${{ secrets.GUARDIAN_THRESHOLD }}
          GUARDIAN_GRACE_MIN: ${{ secrets.GUARDIAN_GRACE_MIN }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
          EMAILJS_SERVICE:    ${{ secrets.EMAILJS_SERVICE }}
          EMAILJS_TEMPLATE:   ${{ secrets.EMAILJS_TEMPLATE }}
          EMAILJS_PUBKEY:     ${{ secrets.EMAILJS_PUBKEY }}
          JSONBIN_BIN_ID:     ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_API_KEY:    ${{ secrets.JSONBIN_API_KEY }}
          TUYA_CLIENT_ID:     ${{ secrets.TUYA_CLIENT_ID }}
          TUYA_SECRET:        ${{ secrets.TUYA_SECRET }}
          TUYA_DEVICE_ID:     ${{ secrets.TUYA_DEVICE_ID }}
        with:
          script: |
            const crypto = require('crypto');

            const DEVICE_ID    = process.env.ACTRON_DEVICE_ID;
            const TOKEN        = process.env.ACTRON_TOKEN;
            const THRESHOLD_DEFAULT = parseFloat(process.env.GUARDIAN_THRESHOLD || '22');
            const GRACE_MIN_DEFAULT = parseFloat(process.env.GUARDIAN_GRACE_MIN || '10');
            const ALERT_EMAIL  = process.env.ALERT_EMAIL;
            const EJS_SERVICE  = process.env.EMAILJS_SERVICE;
            const EJS_TEMPLATE = process.env.EMAILJS_TEMPLATE;
            const EJS_PUBKEY   = process.env.EMAILJS_PUBKEY;
            const BIN_ID       = process.env.JSONBIN_BIN_ID;
            const BIN_KEY      = process.env.JSONBIN_API_KEY;
            const TUYA_CLIENT  = process.env.TUYA_CLIENT_ID;
            const TUYA_SECRET  = process.env.TUYA_SECRET;
            const TUYA_DEVICE  = process.env.TUYA_DEVICE_ID;

            const ACTRON_URL  = `https://que.actronair.com.au/rest/v0/device/${DEVICE_ID}?user_access_token=${TOKEN}`;
            const TUYA_BASE   = 'https://openapi.tuyaeu.com';
            const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
            const JSONBIN_HDR = { 'Content-Type': 'application/json', 'X-Access-Key': BIN_KEY };

            // Power map: kW by mode and fan speed
            // SRD151C-0500: 4.29kW input, 230V
            const POWER_MAP = {
              2: { 0: 3.2, 1: 2.1, 2: 3.2, 3: 4.29 }, // cool
              3: { 0: 2.8, 1: 1.8, 2: 2.8, 3: 3.8  }, // heat
              4: { 0: 0.3, 1: 0.2, 2: 0.3, 3: 0.4  }, // fan
              1: { 0: 3.2, 1: 2.1, 2: 3.2, 3: 4.29 }, // auto
            };
            const POLL_HRS = 5 / 60; // 5 minute intervals

            // ── JSONBIN ──
            async function loadBin() {
              const resp = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Access-Key': BIN_KEY } });
              if (!resp.ok) throw new Error(`JSONBin read HTTP ${resp.status}`);
              const data = await resp.json();
              return data.record || {};
            }
            async function saveBin(record) {
              const resp = await fetch(JSONBIN_URL, {
                method: 'PUT', headers: JSONBIN_HDR, body: JSON.stringify(record)
              });
              if (!resp.ok) throw new Error(`JSONBin write HTTP ${resp.status}`);
            }

            // ── ACTRON ──
            async function getActronStatus() {
              const resp = await fetch(ACTRON_URL, { headers: { Accept: 'application/json' } });
              if (!resp.ok) throw new Error(`Actron HTTP ${resp.status}`);
              const data = await resp.json();
              const da = data?.data?.last_data?.DA;
              if (!da) throw new Error('Unexpected Actron response');
              return da;
            }
            async function sendActronCommand(cmd) {
              const cur = await getActronStatus();
              const payload = { amOn: cur.amOn, tempTarget: cur.tempTarget, fanSpeed: cur.fanSpeed || 0, mode: cur.mode || 2, ...cmd };
              const resp = await fetch(ACTRON_URL, {
                method: 'PUT',
                headers: { Accept: 'application/json', 'Content-Type': 'application/json', Origin: 'https://actronair.com.au' },
                body: JSON.stringify({ DA: payload })
              });
              if (!resp.ok) throw new Error(`Actron command HTTP ${resp.status}`);
            }

            // ── TUYA ──
            function tuyaSign(method, path, accessToken) {
              const t = Date.now().toString();
              const emptyHash = 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855';
              const stringToSign = [method, emptyHash, '', path].join('\n');
              const str = accessToken
                ? TUYA_CLIENT + accessToken + t + stringToSign
                : TUYA_CLIENT + t + stringToSign;
              const sign = crypto.createHmac('sha256', TUYA_SECRET).update(str).digest('hex').toUpperCase();
              return { t, sign };
            }
            async function tuyaGetToken() {
              const path = '/v1.0/token?grant_type=1';
              const { t, sign } = tuyaSign('GET', path, '');
              const resp = await fetch(TUYA_BASE + path, {
                headers: { client_id: TUYA_CLIENT, t, sign, sign_method: 'HMAC-SHA256' }
              });
              const data = await resp.json();
              if (!data.success) throw new Error('Tuya token: ' + data.msg);
              return data.result.access_token;
            }
            async function tuyaGetTemperature() {
              try {
                const token = await tuyaGetToken();
                const path = `/v2.0/cloud/thing/${TUYA_DEVICE}/shadow/properties`;
                const { t, sign } = tuyaSign('GET', path, token);
                const resp = await fetch(TUYA_BASE + path, {
                  headers: { client_id: TUYA_CLIENT, access_token: token, t, sign, sign_method: 'HMAC-SHA256' }
                });
                const data = await resp.json();
                if (!data.success) throw new Error('Tuya: ' + JSON.stringify(data));
                const props = data.result?.properties;
                if (!props) throw new Error('No properties');
                const temp = props.find(p => p.code === 'temp_current');
                const hum  = props.find(p => p.code === 'humidity_value');
                return { temp: temp ? temp.value / 10 : null, humidity: hum ? hum.value : null, time: Date.now() };
              } catch(e) {
                console.log('Tuya error:', e.message);
                return { temp: null, humidity: null, time: Date.now() };
              }
            }

            // ── EMAIL ──
            async function sendEmail(overrideTemp, action) {
              const resp = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'origin': 'https://rodilicious.github.io' },
                body: JSON.stringify({
                  service_id: EJS_SERVICE, template_id: EJS_TEMPLATE, user_id: EJS_PUBKEY, accessToken: EJS_PUBKEY,
                  template_params: {
                    to_email: ALERT_EMAIL, override_temp: overrideTemp, threshold: THRESHOLD,
                    room_temp: 'N/A', action: action,
                    time: new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney' })
                  }
                })
              });
              if (!resp.ok) throw new Error(`EmailJS HTTP ${resp.status}`);
            }

            // ── MAIN ──
            const now = Date.now();
            const todayStr = new Date().toLocaleDateString('en-AU', { timeZone: 'Australia/Sydney' }).split('/').reverse().join('-');
            const monthStr = todayStr.slice(0, 7);

            let bin;
            try { bin = await loadBin(); } catch(e) { bin = {}; console.log('JSONBin load failed:', e.message); }

            // Read settings from JSONBin
            const THRESHOLD     = bin.settings?.guardianThreshold || THRESHOLD_DEFAULT;
            const GRACE_MS      = (bin.settings?.gracePeriodMin || GRACE_MIN_DEFAULT) * 60 * 1000;
            const GUARDIAN_MODE = bin.settings?.guardianMode || 'always';
            const SCHEDULE_FROM = bin.settings?.scheduleFrom || '22:00';
            const SCHEDULE_TO   = bin.settings?.scheduleTo   || '06:00';
            console.log('Mode: ' + GUARDIAN_MODE + ', threshold: ' + THRESHOLD + 'C, grace: ' + (GRACE_MS/60000) + 'min');

            // Check if Guardian should be active based on mode and schedule
            function isGuardianActive() {
              if (GUARDIAN_MODE === 'off') return false;
              if (GUARDIAN_MODE === 'always') return true;
              const sydneyTime = new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney', hour: '2-digit', minute: '2-digit', hour12: false });
              const parts = sydneyTime.split(':');
              const nowMins = parseInt(parts[0]) * 60 + parseInt(parts[1]);
              const fromParts = SCHEDULE_FROM.split(':');
              const toParts   = SCHEDULE_TO.split(':');
              const fromMins  = parseInt(fromParts[0]) * 60 + parseInt(fromParts[1]);
              const toMins    = parseInt(toParts[0])   * 60 + parseInt(toParts[1]);
              if (fromMins > toMins) return nowMins >= fromMins || nowMins < toMins;
              return nowMins >= fromMins && nowMins < toMins;
            }
            let overrideFirstSeen = bin.overrideFirstSeen || null;
            let overrideTemp = bin.overrideTemp || null;
            let cost = bin.cost || { todayKwh: 0, monthKwh: 0, totalKwh: 0, lastDay: null, lastMonth: null, history: {} };

            // Auto-reset on new day/month
            if (cost.lastDay && cost.lastDay !== todayStr) {
              if (cost.lastDay) cost.history[cost.lastDay] = cost.todayKwh;
              const keys = Object.keys(cost.history).sort();
              if (keys.length > 7) delete cost.history[keys[0]];
              cost.todayKwh = 0;
            }
            if (cost.lastMonth && cost.lastMonth !== monthStr) {
              cost.monthKwh = 0;
            }
            cost.lastDay   = todayStr;
            cost.lastMonth = monthStr;

            // Fetch AC status and Tuya temp in parallel
            const [da, tuya] = await Promise.all([
              getActronStatus().catch(e => { console.log('Actron poll failed:', e.message); return null; }),
              tuyaGetTemperature()
            ]);

            if (!da) { console.log('Actron poll failed'); return; }

            const setTemp = da.tempTarget;
            const powerOn = da.amOn;
            const mode    = da.mode || 2;
            const fanSpeed = da.fanSpeed || 0;

            console.log(`Actron: power=${powerOn}, setTemp=${setTemp}C, mode=${mode}, fan=${fanSpeed} | Tuya: temp=${tuya.temp}C, humidity=${tuya.humidity}%`);

            // ── COST TRACKING ──
            if (powerOn) {
              const modeMap = POWER_MAP[mode] || POWER_MAP[2];
              const kw = modeMap[fanSpeed] || modeMap[0];
              const kwh = kw * POLL_HRS;
              cost.todayKwh  += kwh;
              cost.monthKwh  += kwh;
              cost.totalKwh  += kwh;
              console.log(`Cost: +${kwh.toFixed(4)} kWh (${kw}kW x ${POLL_HRS}h) | today=${cost.todayKwh.toFixed(3)}, month=${cost.monthKwh.toFixed(3)}, total=${cost.totalKwh.toFixed(3)}`);
            }

            // ── ACTIVITY LOG ──
            const activityLog = Array.isArray(bin.activityLog) ? bin.activityLog : [];
            function logEntry(msg, type) {
              activityLog.unshift({ time: now, msg, type });
              if (activityLog.length > 100) activityLog.pop();
            }

            // ── GUARDIAN LOGIC ──
            let guardianResult;
            if (!isGuardianActive()) {
              if (bin.overrideFirstSeen) { overrideFirstSeen = null; overrideTemp = null; }
              guardianResult = 'Guardian inactive (' + GUARDIAN_MODE + (GUARDIAN_MODE === 'scheduled' ? ': ' + SCHEDULE_FROM + '-' + SCHEDULE_TO : '') + ')';
            } else if (!powerOn) {
              overrideFirstSeen = null;
              guardianResult = 'AC is off';
            } else if (setTemp < THRESHOLD) {
              if (!overrideFirstSeen) {
                overrideFirstSeen = now;
                overrideTemp = setTemp;
                guardianResult = `Override detected: ${setTemp}C. Grace period started.`;
                logEntry(`⚠️ Override detected — set temp ${setTemp}°C (threshold: ${THRESHOLD}°C). Grace period started.`, 'warn');
                console.log(guardianResult);
              } else {
                const remaining = GRACE_MS - (now - overrideFirstSeen);
                if (remaining > 30000) {
                  guardianResult = `Override persists. ${Math.round(remaining/60000)} min remaining.`;
                  console.log(guardianResult);
                } else {
                  let acOff = false, emailSent = false;
                  try { await sendActronCommand({ amOn: false }); acOff = true; console.log('AC turned off.'); } catch(e) { console.log('AC off failed:', e.message); }
                  try { await sendEmail(setTemp, acOff ? 'The A/C has been turned off by Guardian.' : 'Guardian tried to turn A/C off but failed.'); emailSent = true; console.log('Alert email sent.'); } catch(e) { console.log('Email failed:', e.message); }
                  overrideFirstSeen = null;
                  overrideTemp = null;
                  guardianResult = `Acted: AC off=${acOff}, email=${emailSent}`;
                  if (acOff) logEntry(`🚨 Guardian turned A/C off. Set temp was ${setTemp}°C.`, 'alert');
                }
              }
            } else {
              if (overrideFirstSeen) {
                overrideFirstSeen = null;
                overrideTemp = null;
                guardianResult = `Override corrected: ${setTemp}C`;
                logEntry(`✅ Override corrected — set temp back to ${setTemp}°C.`, 'ok');
                console.log(guardianResult);
              } else {
                guardianResult = `OK: ${setTemp}C is fine`;
              }
            }

            // ── SCHEDULE EXECUTION ──
            const schedules = (bin.settings && bin.settings.schedules) || [];
            if (schedules.length) {
              const sydneyTime = new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney', hour:'2-digit', minute:'2-digit', hour12: false });
              const timeParts  = sydneyTime.replace(',','').trim().split(/\s+/);
              const currentTime = timeParts[timeParts.length - 1]; // HH:MM
              for (const sched of schedules) {
                if (!sched.enabled) continue;
                // Match within the current 5-minute window
                if (sched.time === currentTime || 
                    (sched.time >= currentTime && 
                     sched.time <= currentTime.replace(/:(\d+)$/, (_, m) => ':' + String(Math.min(59, parseInt(m)+4)).padStart(2,'0')))) {
                  const alreadyRanKey = 'sched_' + sched.time + '_' + new Date().toLocaleDateString('en-AU', {timeZone:'Australia/Sydney'});
                  if (bin.lastScheduleRun === alreadyRanKey) continue; // already ran today
                  console.log('Executing schedule: ' + sched.time + ' action=' + sched.action);
                  if (sched.action === 'off') {
                    try {
                      await sendActronCommand({ amOn: false });
                      logEntry('⏰ Schedule: A/C turned off at ' + sched.time, 'info');
                      bin.lastScheduleRun = alreadyRanKey;
                    } catch(e) { console.log('Schedule off failed:', e.message); }
                  } else if (sched.action === 'on') {
                    const modeNumMap = { 0: 2, 1: 3, 2: 4, 3: 1 }; // cool, heat, fan, auto
                    try {
                      await sendActronCommand({ amOn: true, tempTarget: sched.temp, mode: modeNumMap[sched.mode] || 2, fanSpeed: sched.fan || 0 });
                      logEntry('⏰ Schedule: A/C turned on at ' + sched.time + ' (' + sched.temp + '°C)', 'info');
                      bin.lastScheduleRun = alreadyRanKey;
                    } catch(e) { console.log('Schedule on failed:', e.message); }
                  }
                  break; // only run one schedule per cycle
                }
              }
            }

            // Save everything to JSONBin
            try {
              await saveBin({
                overrideFirstSeen,
                overrideTemp,
                activityLog,
                lastScheduleRun: bin.lastScheduleRun || null,
                sensor: { temp: tuya.temp, humidity: tuya.humidity, updatedAt: now },
                cost,
                settings: bin.settings || {}
              });
              console.log('JSONBin updated.');
            } catch(e) { console.log('JSONBin save failed:', e.message); }

            console.log('Guardian:', guardianResult);
